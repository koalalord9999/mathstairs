@switch (appMode()) {
  @case ('home') {
    <main class="min-h-screen w-full flex flex-col items-center justify-center p-4 font-mono text-center relative bg-slate-900">
      <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)] mb-12 animate-bounce">
        BRAIN ROT ACADEMY 🧠
      </h1>
      
      <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl justify-center">
        <!-- Math Card -->
        <button 
          (click)="appMode.set('math')"
          class="flex-1 bg-slate-800 p-8 rounded-3xl border-4 border-cyan-500 shadow-[0_0_30px_rgba(0,255,255,0.3)] transform transition-all duration-300 hover:scale-105 hover:shadow-[0_0_50px_rgba(0,255,255,0.6)] group">
          <div class="text-8xl mb-4 group-hover:animate-spin">🔢</div>
          <h2 class="text-4xl font-black text-cyan-300 mb-2">MATH STAIRS</h2>
          <p class="text-xl text-slate-400 font-bold">CRUSH SOME NUMBERS BRO! 💯</p>
        </button>

        <!-- Comprehension Card -->
        <button 
          (click)="appMode.set('comprehension')"
          class="flex-1 bg-slate-800 p-8 rounded-3xl border-4 border-purple-500 shadow-[0_0_30px_rgba(168,85,247,0.3)] transform transition-all duration-300 hover:scale-105 hover:shadow-[0_0_50px_rgba(168,85,247,0.6)] group">
          <div class="text-8xl mb-4 group-hover:animate-bounce">📚</div>
          <h2 class="text-4xl font-black text-purple-400 mb-2">STORY TIME</h2>
          <p class="text-xl text-slate-400 font-bold">READ AND REMEMBER! 🤓</p>
        </button>
      </div>
    </main>
  }
  @case ('math') {
    <app-math-game (back)="appMode.set('home')"></app-math-game>
  }
  @case ('comprehension') {
    <app-comprehension-game (back)="appMode.set('home')"></app-comprehension-game>
  }
}
